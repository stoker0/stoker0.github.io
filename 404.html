    <style>
        @font-face {
            font-family: "Century Gothic";
            src: url("assets/centurygothic.ttf") format("truetype");
            font-weight: 400;
        }
        @font-face {
            font-family: "Century Gothic";
            src: url("assets/centurygothic_bold.ttf") format("truetype");
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --background: #0a0d12;
            --color: #f2f7ff;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: "Century Gothic", sans-serif;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .container {
            color: var(--color);
            text-align: center;
        }
        .stack {
            display: grid;
            grid-template-columns: 1fr;
            position: relative;
        }
        .stack span {
            grid-row-start: 1;
            grid-column-start: 1;
            font-size: 6rem;
            --stacks: 5;
            --index: var(--stack-index, 0);
            --stack-height: calc(100% / var(--stacks) - 1px);
            --inverse-index: calc(calc(var(--stacks) - 1) - var(--index));
            --clip-top: calc(var(--stack-height) * var(--index));
            --clip-bottom: calc(var(--stack-height) * var(--inverse-index));
            clip-path: inset(var(--clip-top) 0 var(--clip-bottom) 0);
            animation: stack 400ms cubic-bezier(.46,.29,0,1.24) 1 backwards calc(var(--index) * 120ms), glitch 2s ease infinite 2s alternate-reverse;
        }
        .stack span:nth-child(odd) { --glitch-translate: 10px; }
        .stack span:nth-child(even) { --glitch-translate: -10px; }
        @keyframes stack {
            0% {
                opacity: 0;
                transform: translateX(-50%);
                text-shadow: -2px 3px 0 red, 2px -3px 0 blue;
            }
            60% {
                opacity: 0.5;
                transform: translateX(50%);
            }
            80% {
                transform: none;
                opacity: 1;
                text-shadow: 2px -3px 0 red, -2px 3px 0 blue;
            }
            100% {
                text-shadow: none;
            }
        }
        @keyframes glitch {
            0% {
                text-shadow: -2px 3px 0 red, 2px -3px 0 blue;
                transform: translate(var(--glitch-translate));
            }
            2% {
                text-shadow: 2px -3px 0 red, -2px 3px 0 blue;
            }
            4%, 100% {  
                text-shadow: none; 
                transform: none; 
            }
        }
        p {
            color: #8aa4c7;
            padding-top: 10px;
        }
        a {
            color: #8aa4c7;
        }
        .logo-container {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
        }
        .logo-container img {
            width: 120px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stack">
            <span style="--stack-index: 0;">404</span>
            <span style="--stack-index: 1;">404</span>
            <span style="--stack-index: 2;">404</span>
            <span style="--stack-index: 3;">404</span>
            <span style="--stack-index: 4;">404</span>
        </div>
        <p>The page you're looking for can't be found.</p>
        <p><a href="/">&larr; back to benpstoker.com</a></p>
    </div>
</body>
